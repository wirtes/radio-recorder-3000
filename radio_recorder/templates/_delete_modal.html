<dialog id="delete-confirmation" class="delete-modal">
  <form method="dialog">
    <p class="eyebrow">CONFIRM DELETE</p>
    <h3>Delete this item?</h3>
    <p id="delete-confirmation-message"></p>
    <div class="modal-actions">
      <button value="cancel" class="quiet">Cancel</button>
      <button value="confirm" class="danger-solid">Delete</button>
    </div>
  </form>
</dialog>
