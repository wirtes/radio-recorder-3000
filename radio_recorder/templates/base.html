<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1b1b18">
  <title>Radio Recorder 3000</title>
  <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/favicon-180.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('main.index') }}">
      <p class="eyebrow">AUTOMATED BROADCAST ARCHIVE</p>
      <h1>Radio Recorder <span>3000</span></h1>
    </a>
    <div class="header-actions">
      <div id="recording-lamp" class="recording-lamp" role="status" aria-live="polite" aria-label="Not recording">
        <span>Recording</span>
      </div>
      <details class="menu">
        <summary aria-label="Open navigation menu"><span></span><span></span><span></span></summary>
        <nav>
          <a href="{{ url_for('main.index') }}">Dashboard</a>
          <a href="{{ url_for('main.station_config') }}">Stations</a>
          <a href="{{ url_for('main.storage_config') }}">Final storage</a>
        </nav>
      </details>
    </div>
  </header>
  <main>
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script>
    (() => {
      const lamp = document.querySelector('#recording-lamp');
      if (!lamp) return;
      const updateRecordingLamp = async () => {
        try {
          const response = await fetch('{{ url_for("main.recording_status") }}', {
            cache: 'no-store',
          });
          if (!response.ok) throw new Error('Recording status unavailable');
          const status = await response.json();
          lamp.classList.toggle('active', status.recording);
          const showNames = status.shows || [];
          lamp.setAttribute(
            'aria-label',
            status.recording
              ? `Recording ${showNames.join(', ')}`
              : 'Not recording'
          );
          lamp.title = status.recording ? showNames.join(', ') : 'No show is recording';
        } catch (error) {
          lamp.classList.remove('active');
          lamp.setAttribute('aria-label', 'Recording status unavailable');
          lamp.title = 'Recording status unavailable';
        }
      };
      updateRecordingLamp();
      window.setInterval(updateRecordingLamp, 5000);
    })();
  </script>
</body>
</html>
