<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radio Recorder 3000</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">AUTOMATED BROADCAST ARCHIVE</p>
      <h1>Radio Recorder <span>3000</span></h1>
    </div>
    <div class="status"><i></i> Scheduler online</div>
  </header>
  <main>
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
